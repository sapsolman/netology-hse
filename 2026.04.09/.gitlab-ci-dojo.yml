trivy_sca_scan:
  stage: build
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  script:
    - echo "Запуск SCA-сканирования через Trivy..."
    - apk add --no-cache python3 py3-requests
    - trivy fs . --format json --output trivy-report.json || true
    # Имя сканера "Trivy Scan"
    - python3 dojo_upload.py trivy-report.json "Trivy Scan"
  # Продолжаеть работу пайплайна при нахождении уязвимостей (требование к заданию)
  allow_failure: true
  artifacts:
    paths:
      - trivy-report.json
    # Сохраняет артефакт всегда (требование к заданию)
    when: always
    expire_in: 1 week

# ---------------------------------------------------------
# STAGE: TEST (SAST - Bandid)
# ---------------------------------------------------------
bandit_sast_scan:
  stage: test
  image: python:3.10-slim
  script:
    - echo "Установка и запуск SAST-сканера Bandit..."
    - pip install --quiet bandit requests --break-system-packages || pip install --quiet bandit requests
    - bandit -r . -ll -f json -o bandit-report.json || true
    # Имя сканера "Bandit Scan"
    - python3 dojo_upload.py bandit-report.json "Bandit Scan"
  allow_failure: true
  artifacts:
    paths:
      - bandit-report.json
    when: always
    expire_in: 1 week

# ---------------------------------------------------------
# STAGE: PROD (DAST - Zap + Dojo)
# ---------------------------------------------------------
zap_dast_scan:
  stage: prod
  image: 
    name: zaproxy/zap-stable
    entrypoint: [""]
  script:
    - echo "Начинаем динамическое сканирование (DAST) через OWASP ZAP..."
    - mkdir -p /zap/wrk
    - chmod 777 /zap/wrk
    - find /zap -name "*.py" -exec sed -i 's/os.path.ismount/os.path.isdir/g' {} +
    
    # Запуск сканера
    - zap-baseline.py -t http://host.docker.internal:8000 -x zap-report.xml || true
    - cp /zap/wrk/zap-report.xml .

    # Минутка комментов
    - echo "!!!Сканирование на безопасность проведено!!!"
    - echo "Отчёты в артифактах"
    - echo "Место для вашей рекламы..."

    # Ставим переменные через requests
    - pip3 install requests --break-system-packages

    # Выгрузка XML-отчета в DefectDojo
    - python3 dojo_upload.py zap-report.xml "ZAP Scan"

  allow_failure: true
  artifacts:
    paths:
      - zap-report.xml
    when: always
    expire_in: 1 week
